<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Certification Exam</title>
    <link rel="stylesheet" href="style.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EPA 608">
    <meta name="theme-color" content="#ffffff">
</head>
<body>

    <div class="container">
        <header>
            <h1>Practice Certification Exam</h1>
        </header>

        <!-- Start Screen Section -->
        <div id="start-screen">
            <p>Select the length of your exam to begin (questions are selected randomly from the pool).</p>
            
            <p id="loading-msg" class="loading">Loading question database...</p>
            
            <div class="button-group">
                <button type="button" class="start-btn" data-count="25" disabled>25 Questions</button>
                <button type="button" class="start-btn" data-count="50" disabled>50 Questions</button>
                <button type="button" class="start-btn" data-count="100" disabled>100 Questions</button>
            </div>
        </div>

        <!-- Quiz Form (Hidden initially) -->
        <form id="quiz-form" class="hidden">
            <div id="quiz-container">
                <!-- Questions injected here via JS -->
            </div>

            <div class="controls">
                <button type="button" id="submit-btn">Submit Test</button>
            </div>
        </form>

        <!-- Results Section (Hidden initially) -->
        <div id="score-display" class="hidden">
            <h2>Your Score: <span id="score-value">0</span>%</h2>
            <p id="score-message"></p>
            
            <div class="controls">
                <button type="button" id="retry-btn">Start New Exam</button>
            </div>

            <div id="wrong-answers-container" class="hidden">
                <h3>Review Incorrect Answers:</h3>
                <ul id="wrong-answers-list">
                    <!-- Wrong answers injected here -->
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/100epa/service-worker.js')
                    .then(() => console.log('SW registered'))
                    .catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
